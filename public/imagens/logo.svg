<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Dark deep space gradient for the shield interior to contrast the 'A' -->
    <linearGradient id="darkBg" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="100%" stop-color="#112240" />
    </linearGradient>

    <!-- Glowing Cyan VPN line -->
    <linearGradient id="shieldBorder" x1="0" y1="0" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Metallic/Bright A Gradient -->
    <linearGradient id="aGrad" x1="0" y1="400" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f8ff" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Network Cyber Rings (Animated) -->
  <g opacity="0.6" stroke="#4facfe" fill="none" stroke-width="2">
    <circle cx="200" cy="200" r="180" stroke-dasharray="10 20">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="40s" repeatCount="indefinite" />
    </circle>
    <circle cx="200" cy="200" r="170" stroke-dasharray="60 30" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="25s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Dark Shield Base -->
  <path d="M200 40 L60 90 L60 220 C60 300 140 370 200 390 C260 370 340 300 340 220 L340 90 Z" fill="url(#darkBg)" />

  <!-- Neon Shield Border -->
  <path d="M200 40 L60 90 L60 220 C60 300 140 370 200 390 C260 370 340 300 340 220 L340 90 Z" fill="none" stroke="url(#shieldBorder)" stroke-width="12" stroke-linejoin="round" filter="url(#neonGlow)"/>

  <!-- Futuristic Letter 'A' -->
  <path d="M200 110 L110 280 L160 280 L180 230 L220 230 L240 280 L290 280 Z M200 160 L190 205 L210 205 Z" fill="url(#aGrad)" fill-rule="evenodd" filter="url(#neonGlow)"/>

  <!-- Cyber Node Accents -->
  <circle cx="200" cy="40" r="10" fill="#ffffff" filter="url(#neonGlow)"/>
  <circle cx="60" cy="90" r="8" fill="#00f2fe" />
  <circle cx="340" cy="90" r="8" fill="#00f2fe" />
</svg>
