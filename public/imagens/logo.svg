<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Grade de fundo -->
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a8c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo circular -->
  <circle cx="100" cy="100" r="95" fill="url(#gradientBg)" stroke="url(#gradientAccent)" stroke-width="3"/>

  <!-- Lock/Shield principal -->
  <g transform="translate(100, 100)">
    <!-- Escudo externo -->
    <path d="M -35 -25 L -35 -10 C -35 -35 0 -50 0 -50 C 0 -50 35 -35 35 -10 L 35 -25 Z" 
          fill="none" stroke="url(#gradientAccent)" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Cadeado interno -->
    <rect x="-18" y="-10" width="36" height="28" rx="4" 
          fill="none" stroke="white" stroke-width="2"/>
    
    <!-- Haste do cadeado -->
    <path d="M -15 -10 Q -15 -25 0 -25 Q 15 -25 15 -10" 
          fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Buraco do cadeado -->
    <circle cx="0" cy="5" r="3" fill="white"/>
  </g>

  <!-- Texto "VPN" -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="white" text-anchor="middle">ANGOLAN VPN</text>
</svg>
