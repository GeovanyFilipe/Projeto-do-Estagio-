<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="400" height="300" fill="url(#heroGradient)"/>

  <!-- Globo/Mundo -->
  <g transform="translate(200, 120)">
    <!-- Círculo principal (Terra) -->
    <circle cx="0" cy="0" r="70" fill="#0099ff" opacity="0.3"/>
    <circle cx="0" cy="0" r="65" fill="#00d4ff" opacity="0.2"/>
    
    <!-- Continentes simplificados -->
    <path d="M -40,-30 L -20,-35 L -10,-20 L -25,-15 Z" fill="#1e3a5f" opacity="0.6"/>
    <path d="M 10,-25 L 40,-30 L 45,-10 L 20,-5 Z" fill="#1e3a5f" opacity="0.6"/>
    <path d="M -30,10 L 0,15 L 10,30 L -20,25 Z" fill="#1e3a5f" opacity="0.6"/>
  </g>

  <!-- Símbolo de escudo/proteção flutuante -->
  <g transform="translate(280, 200)">
    <path d="M -20 -15 L -20 -5 C -20 -25 0 -35 0 -35 C 0 -35 20 -25 20 -5 L 20 -15 Z" 
          fill="white" opacity="0.9" stroke="white" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.7"/>
  </g>

  <!-- Símbolo de cadeado -->
  <g transform="translate(80, 200)">
    <rect x="-12" y="-5" width="24" height="20" rx="3" 
          fill="white" opacity="0.9" stroke="white" stroke-width="1.5"/>
    <path d="M -10 -5 Q -10 -15 0 -15 Q 10 -15 10 -5" 
          fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="0" cy="5" r="2" fill="white" opacity="0.9"/>
  </g>

  <!-- Linhas de conexão -->
  <line x1="50" y1="50" x2="150" y2="100" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="350" y1="50" x2="250" y2="100" stroke="white" stroke-width="2" opacity="0.5"/>
</svg>
