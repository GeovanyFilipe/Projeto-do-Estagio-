type User @table {
  email: String!
  passwordHash: String!
  createdAt: Timestamp!
  firstName: String
  lastName: String
  lastLoginAt: Timestamp
}

type Server @table {
  name: String!
  location: String!
  ipAddress: String!
  description: String
  latency: Int
}

type SubscriptionType @table {
  name: String!
  price: Float!
  durationMonths: Int!
  maxSpeedMbps: Int!
  maxDevices: Int!
  description: String
}

type UserSubscription @table {
  user: User!
  subscriptionType: SubscriptionType!
  startDate: Timestamp!
  endDate: Timestamp!
  isActive: Boolean!
  autoRenew: Boolean
}

type ConnectionLog @table {
  user: User!
  server: Server!
  connectTime: Timestamp!
  disconnectTime: Timestamp!
  dataTransferredGB: Float
}