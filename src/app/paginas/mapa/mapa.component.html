<app-menu></app-menu>
<div class="vpn-app">
  <main class="main-area">
    <header class="top-bar">
      <div>
        <h1>Angolan Vpn</h1>
        <p>Conexão rápida e segura para acesso local</p>
      </div>
     <button class="btn-primary" (click)="toggleConnection()">{{connectButtonLabel}}</button>
    </header>

    <section class="map-area">
      <div #map class="map"></div>
    </section>

<section class="info-area" *ngIf="isConnected">
  <div class="info-card">
    <span>Status</span>
    <strong [ngClass]="statusClass">{{statusText}}</strong>
  </div>
  <div class="info-card">
    <span>País</span>
    <strong>{{country}}</strong>
  </div>
  <div class="info-card">
    <span>IP</span>
    <strong>{{fakeIp}}</strong>
  </div>
  <div class="info-card">
    <span>Provedor</span>
    <strong>{{provider}}</strong>
  </div>
</section>
  </main>
  
  <!-- Modal de Assinatura Necessária -->
  <div *ngIf="showSubscriptionModal" class="modal-overlay" (click)="closeSubscriptionModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-icon">⭐</div>
      <h2>Requisito de Assinatura</h2>
      <p>Para aceder ao recurso de conexão VPN, você precisa de ter uma assinatura ativa.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" (click)="closeSubscriptionModal()">Agora Não</button>
        <button class="btn btn-primary" (click)="goToPlans()">Ver Planos</button>
      </div>
    </div>
  </div>

</div>
<app-rodape></app-rodape>
