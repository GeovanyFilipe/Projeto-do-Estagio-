<app-menu></app-menu>

<div class="compra-wrapper">

  <!-- RESUMO DO PLANO -->
  <div class="plano-resumo" *ngIf="plano">
    <div class="plano-info">
      <div>
        <h3>{{ plano.nome }}</h3>
        <p>{{ plano.descricao }}</p>
      </div>
    </div>

    <div class="plano-preco">
      <strong>{{ plano.preco }}</strong>
    </div>
  </div>

  <!-- PAGAMENTO -->
  <div class="pagamento-box">
    <h2>Forma de pagamento</h2>

    <div class="metodos">

      <!-- CARTÃO -->
      <label class="metodo" [class.ativo]="metodoPagamento === 'cartao'">
        <input type="radio" name="pagamento" value="cartao" [(ngModel)]="metodoPagamento">

        <div class="metodo-conteudo">
          <span>Cartão de crédito ou débito</span>

          <div class="icons">
            <img *ngIf="!tipoCartao || tipoCartao === 'visa'" src="/imagens/visa-removebg-preview.png" alt="Visa"
              class="payment-icon">
            <img *ngIf="!tipoCartao || tipoCartao === 'mastercard'" src="/imagens/MasterCard.png" alt="Mastercard"
              class="payment-icon">
          </div>
        </div>
      </label>

      <!-- EKWANZA -->
      <label class="metodo" [class.ativo]="metodoPagamento === 'ekwanza'">
        <input type="radio" name="pagamento" value="ekwanza" [(ngModel)]="metodoPagamento">

        <div class="metodo-conteudo">
          <span>E-Kwanza</span>

          <div class="icons">
            <img src="/imagens/ekwanza.png" alt="E-Kwanza" class="payment-icon ekwanza-icon">
          </div>
        </div>
      </label>

    </div>

    <!-- FORM CARTÃO -->
    <form *ngIf="metodoPagamento === 'cartao'" (ngSubmit)="finalizarCompra()" class="form-pagamento">

      <div class="input-group input-com-icon">
        <label for="numeroCartao">Número do cartão</label>
        <div class="input-wrapper">
          <input type="text" id="numeroCartao" placeholder="0000 0000 0000 0000" name="numeroCartao"
            (input)="formatarCartao($event)" autocomplete="off">
          <div class="card-brand-view" *ngIf="tipoCartao">
            <img [src]="tipoCartao === 'visa' ? '/imagens/visa-removebg-preview.png' : '/imagens/MasterCard.png'"
              [alt]="tipoCartao">
          </div>
        </div>
      </div>

      <div class="linha">
        <div class="input-group">
          <label for="dataValidade">Data de validade</label>
          <input type="text" id="dataValidade" name="dataValidade" placeholder="MM/AA"
            (input)="formatarValidade($event)" maxlength="5">
        </div>

        <div class="input-group">
          <label for="cvv">CVV</label>
          <input type="text" id="cvv" name="cvv" placeholder="***" (input)="formatarCVV($event)" maxlength="3">
        </div>
      </div>

      <button type="submit" class="btn-finalizar">
        Confirmar pagamento
      </button>

    </form>

    <!-- EKWANZA -->
    <div *ngIf="metodoPagamento === 'ekwanza'" class="ekwanza-box">

      <p>
        Receberá uma notificação no seu telemóvel para confirmar o pagamento via E-Kwanza.
      </p>

      <button class="btn-finalizar" (click)="finalizarCompra()">
        Pagar com E-Kwanza
      </button>

    </div> 

  </div>
</div>

<app-rodape></app-rodape>
