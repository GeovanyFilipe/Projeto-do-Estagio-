<app-menu></app-menu>

<div class="compra-wrapper">

  <!-- RESUMO DO PLANO -->
  <div class="plano-resumo" *ngIf="plano">
    <div class="plano-info">
      <div class="plano-icon">📦</div>

      <div>
        <h3>{{ plano.nome }}</h3>
        <p>{{ plano.descricao }}</p>
      </div>
    </div>

    <div class="plano-preco">
      <strong>{{ plano.preco }}</strong>
    </div>
  </div>

  <!-- PAGAMENTO -->
  <div class="pagamento-box">
    <h2>Forma de pagamento</h2>

    <div class="metodos">

      <!-- CARTÃO -->
      <label class="metodo" [class.ativo]="metodoPagamento === 'cartao'">
        <input 
          type="radio" 
          name="pagamento" 
          value="cartao"
          [(ngModel)]="metodoPagamento"
        >

        <div class="metodo-conteudo">
          <span>Cartão de crédito ou débito</span>

          <div class="icons">
            <img src="/public/imagens/visa.png" alt="visa">
            <img src="/public/imagens/MasterCard.png" alt="mastercard">
          </div>
        </div>
      </label>

      <!-- EKWANZA -->
      <label class="metodo" [class.ativo]="metodoPagamento === 'ekwanza'">
        <input 
          type="radio" 
          name="pagamento" 
          value="ekwanza"
          [(ngModel)]="metodoPagamento"
        >

        <div class="metodo-conteudo">
          <span>E-Kwanza</span>

          <div class="icons">
            <img src="/public/imagens/ekwanza.png" alt="ekwanza">
          </div>
        </div>
      </label>

    </div>

    <!-- FORM CARTÃO -->
    <form *ngIf="metodoPagamento === 'cartao'" (ngSubmit)="finalizarCompra()" class="form-pagamento">

      <div class="input-group">
        <label>Número do cartão</label>
        <input 
          type="text"
          placeholder="0000 0000 0000 0000"
          (input)="formatarCartao($event)"
        >
      </div>

      <div class="linha">
        <div class="input-group">
          <label>Data de validade</label>
          <input type="text" placeholder="MM/AA">
        </div>

        <div class="input-group">
          <label>CVV</label>
          <input type="text" placeholder="***">
        </div>
      </div>

      <button type="submit" class="btn-finalizar">
        Confirmar pagamento
      </button>

    </form>

    <!-- EKWANZA -->
    <div *ngIf="metodoPagamento === 'ekwanza'" class="ekwanza-box">

      <p>
        Receberá uma notificação no seu telemóvel para confirmar o pagamento via E-Kwanza.
      </p>

      <button class="btn-finalizar" (click)="finalizarCompra()">
        Pagar com E-Kwanza
      </button>

    </div>

  </div>
</div>

<app-rodape></app-rodape>
