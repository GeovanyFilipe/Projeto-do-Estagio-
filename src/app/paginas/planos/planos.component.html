<app-menu></app-menu>

<main class="pagina-container" id="main-content" tabindex="-1">
  <section class="hero">
    <h1>Nossos planos</h1>
    <p>Escolha o plano perfeito para suas necessidades</p>
  </section>

  <section class="planos-container">
    <h2 class="sr-only">Opções de assinatura</h2>
    <div class="planos-grid">
      <article *ngFor="let plano of planos" class="plano-card" [class.destaque]="plano.destaque">
        <header class="plano-header">
          <h2><i class="{{ plano.icon }}"></i> {{ plano.titulo }}</h2>
          <div class="preco">
            <span class="valor">{{ plano.preco }}</span>
            <span class="periodo">/mês</span>
          </div>
        </header>
        <p class="descricao">{{ plano.descricao }}</p>
        <ul class="features">
          <li *ngFor="let feature of plano.features">
            <span class="checkmark" aria-hidden="true">✓</span>
            <span class="sr-only">Vantagem: </span>
            {{ feature }}
          </li>
        </ul>
        <button class="btn-plano" [routerLink]="plano.rota">{{ plano.cta }}</button>
      </article>
    </div>
  </section>
</main>

<app-rodape></app-rodape>
