<div class="login-container">
  <div class="login-box" @boxEntrance>
    <!-- Logo -->
    <div class="login-logo" @logoEntrance>
      <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="#1e3a5f" rx="20" />
        <path d="M50 20 L70 30 L70 50 C70 65 50 80 50 80 C50 80 30 65 30 50 L30 30 Z" fill="#00d4ff" stroke="#fff"
          stroke-width="2" />
        <path d="M50 40 L58 48 L52 48 L52 58 L48 58 L48 48 L42 48 Z" fill="#fff" />
      </svg>
      <h1>VPN Angola</h1>
    </div>

    <!-- Mensagens de erro e sucesso -->
    <div *ngIf="error" class="alert alert-error" @alertSlide>
      <span>{{ error }}</span>
    </div>
    <div *ngIf="success" class="alert alert-success" @alertSlide>
      <span>{{ success }}</span>
    </div>

    <!-- Abas -->
    <div class="tabs">
      <button class="tab" [class.active]="!isRegister" (click)="!isRegister || toggleForm()">
        Login
      </button>
      <button class="tab" [class.active]="isRegister" (click)="isRegister || toggleForm()">
        Cadastro
      </button>
    </div>

    <!-- Formulário Login -->
    <form *ngIf="!isRegister" (ngSubmit)="submit()" class="form" @formSwitch>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Mínimo 6 caracteres"
          required />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Entrar</span>
        <span *ngIf="loading">Carregando...</span>
      </button>

      <div class="divider">
        <span>OU</span>
      </div>

      <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="loading">
        <svg viewBox="0 0 48 48" width="24" height="24">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
          <path fill="none" d="M0 0h48v48H0z"></path>
        </svg>
        Entrar com Google
      </button>

      <p class="help-text">
        Não tem conta? <a href="#" (click)="toggleForm(); $event.preventDefault()">Cadastre-se</a>
      </p>
    </form>

    <!-- Formulário Cadastro -->
    <form *ngIf="isRegister" (ngSubmit)="submit()" class="form" @formSwitch>
      <div class="form-group">
        <label for="register-name">Nome Completo</label>
        <input type="text" id="register-name" name="nome" [(ngModel)]="nome" placeholder="Seu nome completo" required />
      </div>

      <div class="form-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" name="email" [(ngModel)]="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="register-password">Senha</label>
        <input type="password" id="register-password" name="password" [(ngModel)]="password"
          placeholder="Mínimo 6 caracteres" required />
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Cadastrar</span>
        <span *ngIf="loading">Carregando...</span>
      </button>

      <div class="divider">
        <span>OU</span>
      </div>

      <button type="button" class="btn-google" (click)="loginWithGoogle()" [disabled]="loading">
        <svg viewBox="0 0 48 48" width="24" height="24">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24s.92 7.54 2.56 10.78l7.97-6.19z"></path>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
          <path fill="none" d="M0 0h48v48H0z"></path>
        </svg>
        Entrar com Google
      </button>

      <p class="help-text">
        Já tem conta? <a href="#" (click)="toggleForm(); $event.preventDefault()">Faça login</a>
      </p>
    </form>

    <!-- Links úteis -->
    <div class="footer-links">
      <a href="/">Voltar para início</a>
      <span>•</span>
      <a href="/suporte/tecnico">Precisa de ajuda?</a>
    </div>
  </div>
</div>
