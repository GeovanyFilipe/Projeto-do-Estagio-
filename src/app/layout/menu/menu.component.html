<nav class="navbar">
  <div class="container">

    <!-- Logo -->
    <div class="logo-box">
      <a routerLink="/" class="logo-link" (click)="closeMobileMenu()">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 10L30 35H0L15 10Z" fill="#00D4FF" />
            <circle cx="28" cy="20" r="10" fill="#006699" />
          </svg>
        </div>
        <span class="logo-text">Angolan VPN</span>
      </a>
    </div>

    <!-- Links Centrais (Desktop) -->
    <div class="nav-links" [class.mobile-open]="isMobileMenuOpen">

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
         class="nav-item" (click)="closeMobileMenu()">Início</a>

      <!-- Dropdown Planos -->
      <div class="nav-item dropdown" [class.open]="isDropdownOpen('planos')">
        <span class="trigger" (click)="toggleDropdown('planos')">
          Planos
          <i class="fas fa-chevron-down arrow-icon" [class.rotated]="isDropdownOpen('planos')"></i>
        </span>
        <div class="dropdown-content" [class.visible]="isDropdownOpen('planos')">
          <a routerLink="/planos/individual"   (click)="closeMobileMenu()">Individual</a>
          <a routerLink="/planos/negocio"      (click)="closeMobileMenu()">Negócio</a>
          <a routerLink="/planos/empresarial"  (click)="closeMobileMenu()">Empresarial</a>
          <a routerLink="/planos/educacional"  (click)="closeMobileMenu()">Educacional</a>
        </div>
      </div>

      <a routerLink="/download"  routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">Download</a>
      <a routerLink="/empresas"  routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">Empresas</a>

      <!-- Dropdown Contacto -->
      <div class="nav-item dropdown" [class.open]="isDropdownOpen('contacto')">
        <span class="trigger" (click)="toggleDropdown('contacto')">
          Contacto
          <i class="fas fa-chevron-down arrow-icon" [class.rotated]="isDropdownOpen('contacto')"></i>
        </span>
        <div class="dropdown-content" [class.visible]="isDropdownOpen('contacto')">
          <a routerLink="/suporte/tecnico"   (click)="closeMobileMenu()">Suporte Técnico</a>
          <a routerLink="/suporte/comercial" (click)="closeMobileMenu()">Comercial</a>
        </div>
      </div>

      <!-- Botão conta (dentro do menu mobile) -->
      <div class="mobile-account-section">
        <ng-container *ngIf="!(authService.isAuthenticated$ | async); else mobileLoggedIn">
          <button class="btn-account mobile-full" routerLink="/login" (click)="closeMobileMenu()">
            <i class="fas fa-sign-in-alt"></i> Entrar na Conta
          </button>
        </ng-container>
        <ng-template #mobileLoggedIn>
          <a routerLink="/cliente/dashboard" fragment="perfil" class="mobile-menu-link"
             (click)="closeMobileMenu()">
            <i class="fas fa-chart-line"></i> Painel Administrativo
          </a>
          <button class="mobile-menu-link logout" (click)="logout()">
            <i class="fas fa-power-off"></i> Sair
          </button>
        </ng-template>
      </div>
    </div>

    <!-- Ação de Conta (Desktop) -->
    <div class="nav-actions">
      <!-- Não logado -->
      <ng-container *ngIf="!(authService.isAuthenticated$ | async); else userLoggedIn">
        <button class="btn-account" routerLink="/login">
          <i class="fas fa-sign-in-alt"></i> Entrar na Conta
        </button>
      </ng-container>

      <!-- Logado -->
      <ng-template #userLoggedIn>
        <div class="nav-item dropdown account-dropdown" [class.open]="isDropdownOpen('account')">
          <button class="btn-account logged-in" (click)="toggleDropdown('account')">
            <i class="fas fa-user-circle"></i>
            {{ currentUser?.nome || 'Minha Conta' }}
            <i class="fas fa-chevron-down arrow-icon" [class.rotated]="isDropdownOpen('account')"></i>
          </button>
          <div class="dropdown-content right-align" [class.visible]="isDropdownOpen('account')">
            <a routerLink="/cliente/dashboard" fragment="perfil" (click)="closeMobileMenu()">
              <i class="fas fa-chart-line"></i> Painel administrativo
            </a>
            <button (click)="logout()" class="logout-link">
              <i class="fas fa-power-off"></i> Sair
            </button>
          </div>
        </div>
      </ng-template>

      <!-- Botão hambúrguer (mobile) -->
      <button class="hamburger" (click)="toggleMobileMenu()" aria-label="Menu">
        <span [class.open]="isMobileMenuOpen"></span>
        <span [class.open]="isMobileMenuOpen"></span>
        <span [class.open]="isMobileMenuOpen"></span>
      </button>
    </div>
  </div>
</nav>

<!-- Overlay para fechar menu ao clicar fora (mobile) -->
<div class="mobile-overlay" [class.active]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
