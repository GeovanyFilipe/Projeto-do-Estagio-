<nav class="navbar-container">
  <div class="navbar-wrapper">
    <!-- Logo -->
    <div class="navbar-logo">
      <a routerLink="/" class="logo-link">
        <img src="imagens/logo.svg" alt="Angolan VPN" class="logo-img">
        <span class="logo-text">Angolan VPN</span>
      </a>
    </div>

    <!-- Menu Hamburguês Mobile -->
    <button class="mobile-toggle" (click)="toggleMobileMenu()" [class.active]="isMobileMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Menu Principal -->
    <div class="navbar-menu" [class.mobile-open]="isMobileMenuOpen">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a routerLink="/" class="nav-link" (click)="closeMobileMenu()">Início</a>
        </li>

        <!-- Dropdown Planos -->
        <li class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle"
            (click)="toggleDropdown('planos'); $event.preventDefault()"
            [class.active]="activeDropdown === 'planos'">
            Planos
            <svg class="dropdown-icon" width="12" height="8" viewBox="0 0 12 8" fill="none">
              <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </a>
          <div class="dropdown-menu" [class.show]="activeDropdown === 'planos'">
            <a routerLink="/planos/youtube" class="dropdown-item" (click)="closeMobileMenu()">
              <span class="icon">📺</span>
              Plano YouTube sem Anúncios
            </a>
            <a routerLink="/planos/gobierno" class="dropdown-item" (click)="closeMobileMenu()">
              <span class="icon">🏛️</span>
              Plano .GOV.AO
            </a>
          </div>
        </li>

        <li class="nav-item">
          <a routerLink="/download" class="nav-link" (click)="closeMobileMenu()">Download</a>
        </li>
        <li class="nav-item">
          <a routerLink="/empresas" class="nav-link" (click)="closeMobileMenu()">Empresas</a>
        </li>

        <!-- Dropdown Contacto -->
        <li class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle"
            (click)="toggleDropdown('contacto'); $event.preventDefault()"
            [class.active]="activeDropdown === 'contacto'">
            Contacto
            <svg class="dropdown-icon" width="12" height="8" viewBox="0 0 12 8" fill="none">
              <path d="M1 1L6 6L11 1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </a>
          <div class="dropdown-menu" [class.show]="activeDropdown === 'contacto'">
            <div class="dropdown-section">
              <p class="dropdown-label">Suporte</p>
              <a routerLink="/suporte/tecnico" class="dropdown-item sub-item" (click)="closeMobileMenu()">
                <span class="icon">🔧</span>
                Técnico
              </a>
              <a routerLink="/suporte/comercial" class="dropdown-item sub-item" (click)="closeMobileMenu()">
                <span class="icon">💼</span>
                Comercial
              </a>
            </div>
          </div>
        </li>
      </ul>

      <!-- Botões de Ação - Não Autenticado -->
      <div class="navbar-actions" *ngIf="!isAuthenticated">
        <button class="btn-login" (click)="goToLogin()">Entrar</button>
      </div>

      <!-- Botões de Ação - Autenticado -->
      <div class="navbar-actions-auth" *ngIf="isAuthenticated">
        <button class="user-profile" (click)="goToPerfil()">
          <div class="user-avatar">{{ (currentUser?.nome || 'U').charAt(0).toUpperCase() }}</div>
          <div class="user-info">
            <p class="user-name">{{ currentUser?.nome }}</p>
            <p class="user-plan">{{ currentUser?.plano || 'Sem plano' }}</p>
          </div>
        </button>
        <button class="btn-logout" (click)="logout()">Sair</button>
      </div>
    </div>

    <!-- Overlay para fechar menu mobile -->
    <div class="mobile-overlay" [class.show]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
  </div>
</nav>
