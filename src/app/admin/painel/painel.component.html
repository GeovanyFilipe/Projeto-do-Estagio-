<div class="painel-container">
  <div class="painel-header">
    <h1 class="teste">Painel de Clientes</h1>
    <p>Gerenciar sua conta e assinatura</p>
  </div>

  <div class="painel-content">
    <div class="painel-card">
      <h2>Minha Assinatura</h2>
      <div class="card-content">
        <p><strong>Plano Atual:</strong> Plano YouTube</p>
        <p><strong>Status:</strong> <span class="status-ativo">Ativo</span></p>
        <p><strong>Próxido Vencimento:</strong> 15/04/2026</p>
        <button class="btn-acao">Gerenciar Plano</button>
      </div>
    </div>

    <div class="painel-card">
      <h2>Meus Dispositivos</h2>
      <div class="card-content">
        <div class="dispositivo">
          <p>Windows 11 - Principal</p>
          <p class="data">Último acesso: 31/03/2026</p>
        </div>
        <div class="dispositivo">
          <p>Android - Smartphone</p>
          <p class="data">Último acesso: 30/03/2026</p>
        </div>
        <button class="btn-acao">Gerenciar Dispositivos</button>
      </div>
    </div>

    <div class="painel-card">
      <h2>Faturamento</h2>
      <div class="card-content">
        <button class="btn-acao">Ver Faturas</button>
        <button class="btn-acao secundario">Atualizar Forma de Pagamento</button>
      </div>
    </div>

    <div class="painel-card">
      <h2>Conta</h2>
      <div class="card-content">
        <button class="btn-acao secundario">Alterar Senha</button>
        <button class="btn-acao secundario">Verificação em Duas Etapas</button>
        <button class="btn-acao perigo">Sair da Conta</button>
      </div>
    </div>
  </div>
</div>
